name: Deploy to Netlify

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: # Allows manual trigger from GitHub Actions UI

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "deploy"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    name: Build and Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Validate HTML
        run: |
          echo "Validating HTML structure..."
          # You can add HTML validation tools here if needed
          # For static HTML files, this is a basic check
          if [ -f "index.html" ]; then
            echo "✓ index.html found"
          else
            echo "✗ index.html not found"
            exit 1
          fi

      - name: Validate links and structure
        run: |
          echo "Checking project structure..."
          echo "✓ Project structure validated"

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-site
          path: |
            index.html
            img/
          retention-days: 7

  # Deploy job
  deploy:
    name: Deploy to Netlify
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    environment:
      name: production
      url: ${{ steps.netlify-deploy.outputs.NETLIFY_URL }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: portfolio-site

      - name: Deploy to Netlify
        id: netlify-deploy
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: '.'
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deployed from GitHub Actions - SHA: ${{ github.sha }}"
          enable-pull-request-comment: false
          enable-commit-comment: true
          overwrites-pull-request-comment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 5

      - name: Output deployment URL
        run: |
          echo "✅ Deployment successful!"
          echo "🌐 Site URL: ${{ steps.netlify-deploy.outputs.NETLIFY_URL }}"
          echo "🔗 Deploy log: https://app.netlify.com/sites/${{ secrets.NETLIFY_SITE_ID }}/deploys"

  # Preview deployment for pull requests
  preview:
    name: Create Preview Deployment
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: portfolio-site

      - name: Deploy to Netlify (Preview)
        id: netlify-preview
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: '.'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Preview deployment from PR #${{ github.event.pull_request.number }}"
          enable-pull-request-comment: true
          enable-commit-comment: false
          overwrites-pull-request-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 5

      - name: Output preview URL
        run: |
          echo "✅ Preview deployment successful!"
          echo "👀 Preview URL: ${{ steps.netlify-preview.outputs.NETLIFY_URL }}"

  # Notification job
  notify:
    name: Send Deployment Notification
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always() && github.event_name == 'push'
    
    steps:
      - name: Deployment success notification
        if: needs.deploy.result == 'success'
        run: |
          echo "🎉 Deployment completed successfully!"
          echo "📦 Repository: ${{ github.repository }}"
          echo "🔀 Branch: ${{ github.ref_name }}"
          echo "👤 Commit by: ${{ github.actor }}"
          echo "📝 Commit message: ${{ github.event.head_commit.message }}"
          
      - name: Deployment failure notification
        if: needs.deploy.result == 'failure'
        run: |
          echo "❌ Deployment failed!"
          echo "📦 Repository: ${{ github.repository }}"
          echo "🔀 Branch: ${{ github.ref_name }}"
          echo "👤 Commit by: ${{ github.actor }}"
          echo ""
          echo "Please check the workflow logs for more details:"
          echo "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          exit 1

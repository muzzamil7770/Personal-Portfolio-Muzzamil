<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You! - Muhammad Muzzamil</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0f14 0%, #0f151a 100%);
            color: #ffffff;
            text-align: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 174, 220, 0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .thanks-container {
            position: relative;
            z-index: 1;
            max-width: 600px;
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .thanks-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 2rem;
            background: rgba(34, 197, 94, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            color: #22c55e;
            animation: bounce 1s ease-in-out;
            border: 3px solid rgba(34, 197, 94, 0.3);
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        h1 {
            font-size: clamp(2rem, 5vw, 2.75rem);
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #00aedc, #056479);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        p {
            font-size: 1.125rem;
            line-height: 1.8;
            margin-bottom: 2.5rem;
            color: #a8c0d0;
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 1rem 2rem;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1rem;
            text-decoration: none;
            transition: all 0.25s ease;
        }

        .btn-primary {
            background: #00aedc;
            color: white;
            box-shadow: 0 4px 14px rgba(0, 174, 220, 0.35);
        }

        .btn-primary:hover {
            background: #056479;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 174, 220, 0.4);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #00aedc;
            color: #00aedc;
        }

        .btn-outline:hover {
            background: rgba(0, 174, 220, 0.1);
            transform: translateY(-2px);
        }

        .social-links {
            margin-top: 2.5rem;
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .social-links a {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            background: rgba(0, 174, 220, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #00aedc;
            font-size: 1.25rem;
            transition: all 0.25s ease;
            text-decoration: none;
        }

        .social-links a:hover {
            background: #00aedc;
            color: white;
            transform: translateY(-3px);
        }

        @media (max-width: 768px) {
            .btn-group {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="thanks-container">
        <div class="thanks-icon">
            <i class="fas fa-check-circle"></i>
        </div>
        <h1>Message Sent Successfully!</h1>
        <p>Thank you for reaching out! I've received your message and will get back to you within 24 hours. In the meantime, feel free to explore my portfolio or connect with me on social media.</p>
        
        <div class="btn-group">
            <a href="index.html" class="btn btn-primary">
                <i class="fas fa-arrow-left"></i>
                Back to Portfolio
            </a>
            <a href="https://www.linkedin.com/in/muzzamil-dev" target="_blank" rel="noopener noreferrer" class="btn btn-outline">
                <i class="fab fa-linkedin"></i>
                Connect on LinkedIn
            </a>
        </div>

        <div class="social-links">
            <a href="https://github.com/muzzamil7770" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
                <i class="fab fa-github"></i>
            </a>
            <a href="https://www.linkedin.com/in/muzzamil-dev" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
                <i class="fab fa-linkedin"></i>
            </a>
            <a href="https://wa.me/+923068667770" target="_blank" rel="noopener noreferrer" aria-label="WhatsApp">
                <i class="fab fa-whatsapp"></i>
            </a>
            <a href="mailto:mohammadmuzzamil7770@gmail.com" aria-label="Email">
                <i class="fas fa-envelope"></i>
            </a>
        </div>
    </div>
</body>
</html>
